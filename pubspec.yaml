version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  carousel_slider: ^5.1.2
  bootstrap_icons: ^1.13.1
  cupertino_icons: ^1.0.8
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  supabase_flutter: ^2.8.0
  intl: ^0.20.1
  image_picker: ^1.1.2
  file_picker: 10.3.10
